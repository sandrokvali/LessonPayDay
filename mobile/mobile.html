<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>გაკვეთილების გადასახადები</title>
    <link rel="stylesheet" href="mobile.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

       <script>
  function detectMob() {
    const toMatch = [
        /Android/i,
        /webOS/i,
        /iPhone/i,
        /iPad/i,
        /iPod/i,
        /BlackBerry/i,
        /Windows Phone/i
    ];
    
    return toMatch.some((toMatchItem) => {
        return navigator.userAgent.match(toMatchItem);
    });
}


  if(! detectMob()) {
    window.location.replace("/");
  }

    </script>

    <header class="mobile-header">
        <div class="logo">გაკვეთილები <span>2026</span></div>
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="btn-small" id="toggleCalendarBtnMobile" onclick="toggleFullCalendarMobile()">Show Full</button>
            <!-- <div id="syncIndicator">Synced</div> -->
        </div>
    </header>

    <main id="calendarContainer" class="mobile-scroller">
        </main>

    <nav class="bottom-nav">
        <button class="pay-menu-btn" onclick="openPaySummary()">
            <span>📅</span> გადასახადები
        </button>
    </nav>

    <div id="summaryModal" class="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>გადასახადები</h3>
            </div>
            <div id="summaryList" class="forecast-list"></div>
            <button class="btn-close" onclick="closeModal('summaryModal')">გაუქმება</button>
        </div>
    </div>

    <div id="dayModal" class="modal">
        <div class="modal-card">
            <h3 id="dayTitle">Date</h3>
            <div id="payAlert"></div>
            <div id="dayLessons"></div>
            <button class="btn-close" onclick="closeModal('dayModal')">დახურვა</button>
        </div>
    </div>

    <script src="mobile.js"></script>
</body>
</html>
